name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (CPU-only deps)
        run: |
          python -m pip install --upgrade pip
          # CPU torch — the gpu extras (flash-attn, mamba-ssm, triton) need CUDA.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check chimera tests train scripts eval
      - name: Pyright typecheck
        run: pyright
      - name: Pytest
        run: pytest tests/ -v
